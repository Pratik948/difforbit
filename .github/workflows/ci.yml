name: CI

on:
  push:
    branches: [main, master, "claude/**", "feat/**", "fix/**"]
  pull_request:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: "20"

jobs:
  # ── TypeScript typecheck ────────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Clone and build MatrixUI
        run: |
          git clone https://github.com/Pratik948/matrix-ui.git ../matrix-ui
          cd ../matrix-ui
          npm install -g pnpm
          pnpm install --frozen-lockfile 2>/dev/null || pnpm install
          pnpm build

      - name: Install frontend deps
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

  # ── ESLint ──────────────────────────────────────────────────────────────────
  lint:
    name: ESLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Clone and build MatrixUI
        run: |
          git clone https://github.com/Pratik948/matrix-ui.git ../matrix-ui
          cd ../matrix-ui
          npm install -g pnpm
          pnpm install --frozen-lockfile 2>/dev/null || pnpm install
          pnpm build

      - name: Install frontend deps
        run: npm ci

      - name: Run ESLint
        run: |
          if [ -f ".eslintrc.cjs" ] || [ -f "eslint.config.js" ] || [ -f "eslint.config.mjs" ]; then
            npx eslint src/ --max-warnings 0
          else
            echo "No ESLint config found — skipping"
          fi

  # ── Rust cargo check ────────────────────────────────────────────────────────
  cargo-check:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            pkg-config \
            build-essential

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo check
        working-directory: src-tauri
        run: cargo check

      - name: cargo clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings
        continue-on-error: true

  # ── Frontend build (no Tauri) ───────────────────────────────────────────────
  build-frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    needs: [typecheck]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Clone and build MatrixUI
        run: |
          git clone https://github.com/Pratik948/matrix-ui.git ../matrix-ui
          cd ../matrix-ui
          npm install -g pnpm
          pnpm install --frozen-lockfile 2>/dev/null || pnpm install
          pnpm build

      - name: Install frontend deps
        run: npm ci

      - name: Build frontend (Vite)
        run: npx vite build

      - name: Upload dist artefact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 7
