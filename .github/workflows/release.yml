name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  NODE_VERSION: "20"

jobs:
  release-macos:
    name: macOS Universal DMG
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin, aarch64-apple-darwin

      - name: Install frontend deps
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      # ── Build + upload DMG as a draft release ──────────────────────────────
      - name: Build Tauri app (draft release)
        uses: tauri-apps/tauri-action@v0
        id: tauri_build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: DiffOrbit ${{ github.ref_name }}
          releaseDraft: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: --target universal-apple-darwin

      # ── Compute SHA256 from the artifact tauri-action built ────────────────
      - name: Calculate SHA256
        id: checksum
        run: |
          # tauri-action outputs a JSON array of artifact paths
          ARTIFACT_PATHS='${{ steps.tauri_build.outputs.artifactPaths }}'
          DMG=$(echo "$ARTIFACT_PATHS" | tr -d '[]"' | tr ',' '\n' | grep '\.dmg$' | head -n 1)

          if [[ -z "$DMG" ]]; then
            # fallback: scan the build dir directly
            DMG=$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -name "*.dmg" | head -n 1)
          fi

          if [[ -z "$DMG" ]]; then
            echo "Error: DMG not found"
            exit 1
          fi

          SHA256=$(shasum -a 256 "$DMG" | awk '{print $1}')
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "dmg_name=$(basename "$DMG")" >> "$GITHUB_OUTPUT"

      # ── Publish the draft: add release body with SHA256 ───────────────────
      - name: Publish release with SHA256
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: DiffOrbit ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          body: |
            ## DiffOrbit ${{ github.ref_name }} (Universal)

            ### Installation via Homebrew
            ```bash
            brew tap Pratik948/difforbit
            brew install --cask difforbit
            ```

            ### Details
            - **Architecture:** Universal (Intel + Apple Silicon)
            - **SHA256:** `${{ steps.checksum.outputs.sha256 }}`
            - **Note:** This build is not notarized. Right-click and select "Open" on first launch.

            ### Homebrew cask snippet
            ```ruby
            sha256 "${{ steps.checksum.outputs.sha256 }}"
            ```
