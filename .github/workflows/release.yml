name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  NODE_VERSION: "20"

jobs:
  release-macos:
    name: macOS Universal DMG
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Add both targets required for a Universal Binary
          targets: x86_64-apple-darwin, aarch64-apple-darwin

      - name: Cache Rust registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: macos-universal-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            macos-universal-cargo-

      - name: Install frontend deps
        run: npm ci

      # ── Build Universal Tauri app ──────────────────────────────────────────
      - name: Build Tauri app
        # The --target universal flag tells Tauri to build for both architectures
        run: npm run tauri build -- --target universal

      # ── Collect artefacts ──────────────────────────────────────────────────
      - name: Collect release artefacts
        id: artefacts
        run: |
          # Universal builds are usually placed in a 'universal-apple-darwin' folder
          BUNDLE_DIR="src-tauri/target/universal-apple-darwin/release/bundle"
          DMG=$(find "$BUNDLE_DIR/dmg" -name "*.dmg" 2>/dev/null | head -1 || true)
          
          if [[ -n "$DMG" ]]; then
            SHA256=$(shasum -a 256 "$DMG" | awk '{print $1}')
            echo "dmg_sha256=${SHA256}" >> "$GITHUB_OUTPUT"
            echo "dmg=${DMG}" >> "$GITHUB_OUTPUT"
          fi

          echo "dmg=${DMG}" >> "$GITHUB_OUTPUT"

          echo "=== Release artefacts ==="
          [[ -n "$DMG" ]] && echo "  DMG:  $DMG ($(du -sh "$DMG" | cut -f1))"
          [[ -n "$SHA256" ]] && echo "  SHA256: $SHA256"

      # ── Create GitHub Release ──────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DiffOrbit ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            ${{ steps.artefacts.outputs.dmg }}
          body: |
            ## DiffOrbit ${{ github.ref_name }}

            ### Homebrew Installation
            ```bash
            brew tap Pratik948/difforbit
            brew install --cask difforbit
            ```
            *Note: As this build is not notarized, you may need to allow it in System Settings > Privacy & Security upon first launch.*

            ### Manual Installation
            1. Download `DiffOrbit_*.dmg`
            2. Open the DMG and drag DiffOrbit to Applications