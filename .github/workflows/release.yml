name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  NODE_VERSION: "20"

jobs:
  # ── Build and release macOS DMG ─────────────────────────────────────────────
  release-macos:
    name: macOS DMG
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: macos-cargo-release-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            macos-cargo-release-
            macos-cargo-

      - name: Install frontend deps
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      # ── Code signing setup ─────────────────────────────────────────────────
      - name: Import Apple certificate
        if: env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/difforbit-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          CERT_PATH=$(mktemp /tmp/difforbit-cert-XXXXXX.p12)
          echo "${APPLE_CERTIFICATE}" | base64 --decode > "$CERT_PATH"
          security import "$CERT_PATH" -P "${APPLE_CERTIFICATE_PASSWORD}" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          rm "$CERT_PATH"

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> "$GITHUB_ENV"

      # ── Tauri build ────────────────────────────────────────────────────────
      - name: Build Tauri app
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: npm run tauri build

      # ── Notarisation ───────────────────────────────────────────────────────
      - name: Notarise DMG
        if: env.APPLE_ID != ''
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
        run: |
          BUNDLE_DIR="src-tauri/target/release/bundle"
          DMG=$(find "$BUNDLE_DIR/dmg" -name "*.dmg" 2>/dev/null | head -1 || true)
          APP=$(find "$BUNDLE_DIR/macos" -name "*.app" 2>/dev/null | head -1 || true)

          if [[ -n "$DMG" ]]; then
            xcrun notarytool submit "$DMG" \
              --apple-id "$APPLE_ID" \
              --team-id  "$APPLE_TEAM_ID" \
              --password "$APPLE_ID_PASSWORD" \
              --wait

            xcrun stapler staple "$APP" || true
            xcrun stapler staple "$DMG" || true
            spctl --assess --type exec "$APP" && echo "Gatekeeper: passed"
          else
            echo "No DMG found — skipping notarisation"
          fi

      # ── Collect artefacts ──────────────────────────────────────────────────
      - name: Collect release artefacts
        id: artefacts
        run: |
          BUNDLE_DIR="src-tauri/target/release/bundle"
          DMG=$(find "$BUNDLE_DIR/dmg" -name "*.dmg" 2>/dev/null | head -1 || true)
          APP_TAR=""
          APP=$(find "$BUNDLE_DIR/macos" -name "*.app" 2>/dev/null | head -1 || true)

          if [[ -n "$APP" ]]; then
            APP_TAR="${APP%.app}.tar.gz"
            tar -czf "$APP_TAR" -C "$(dirname "$APP")" "$(basename "$APP")"
          fi

          echo "dmg=${DMG}" >> "$GITHUB_OUTPUT"
          echo "app_tar=${APP_TAR}" >> "$GITHUB_OUTPUT"

          echo "=== Release artefacts ==="
          [[ -n "$DMG" ]] && echo "  DMG:  $DMG ($(du -sh "$DMG" | cut -f1))"
          [[ -n "$APP_TAR" ]] && echo "  App:  $APP_TAR ($(du -sh "$APP_TAR" | cut -f1))"

      # ── Create GitHub Release ──────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DiffOrbit ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            ${{ steps.artefacts.outputs.dmg }}
            ${{ steps.artefacts.outputs.app_tar }}
          body: |
            ## DiffOrbit ${{ github.ref_name }}

            ### Installation
            1. Download `DiffOrbit_*.dmg`
            2. Open the DMG and drag DiffOrbit to Applications
            3. Launch from Applications — it will live in your menu bar

            ### Requirements
            - macOS 13 Ventura or later
            - [GitHub CLI](https://cli.github.com) (`gh auth login`)
            - An Anthropic / OpenAI-compatible API key **or** the Claude Code CLI

      # ── Cleanup keychain ───────────────────────────────────────────────────
      - name: Cleanup signing keychain
        if: always() && env.KEYCHAIN_PATH != ''
        run: |
          security delete-keychain "$KEYCHAIN_PATH" || true
