name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  NODE_VERSION: "20"

jobs:
  release-macos:
    name: macOS Universal DMG
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          # Add both targets required for a Universal Binary
          targets: x86_64-apple-darwin, aarch64-apple-darwin

      - name: Install frontend deps
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      # ── Build Universal Tauri app ──────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        id: tauri_build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # This flag tells the action to run 'tauri build --target universal'
          args: --target universal

      # ── Collect SHA256 for Homebrew ────────────────────────────────────────
      - name: Calculate Checksum
        id: checksum
        run: |
          # The action outputs the created artifacts; we find the DMG in the target folder
          DMG=$(find src-tauri/target/universal-apple-darwin/release/bundle/dmg -name "*.dmg" | head -n 1)
          if [[ -n "$DMG" ]]; then
            SHA256=$(shasum -a 256 "$DMG" | awk '{print $1}')
            echo "dmg_path=$DMG" >> "$GITHUB_OUTPUT"
            echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
            echo "Final SHA256 for Homebrew: $SHA256"
          fi

      # ── Create GitHub Release ──────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: DiffOrbit ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            ${{ steps.checksum.outputs.dmg_path }}
          body: |
            ## DiffOrbit ${{ github.ref_name }} (Universal)

            ### Installation via Homebrew
            ```bash
            brew tap Pratik948/difforbit
            brew install --cask difforbit
            ```

            ### Details
            - **Architecture:** Universal (Intel + Apple Silicon)
            - **SHA256:** `${{ steps.checksum.outputs.sha256 }}`
            - **Note:** This build is not notarized. Right-click and select "Open" on first launch.